
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Swagger UI</title>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Code+Pro:300,600|Titillium+Web:400,600,700" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/3.24.2/swagger-ui.css" >
  <style>
    html
    {
      box-sizing: border-box;
      overflow: -moz-scrollbars-vertical;
      overflow-y: scroll;
    }
    *,
    *:before,
    *:after
    {
      box-sizing: inherit;
    }

    body {
      margin:0;
      background: #fafafa;
    }
  </style>
</head>
<body>

<div id="swagger-ui"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/3.24.2/swagger-ui-bundle.js"> </script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/3.24.2/swagger-ui-standalone-preset.js"> </script>
<script>
window.onload = function() {

  var spec = {"openapi": "3.0.0", "info": {"title": "Kleines Mypage API", "description": "API developed for Kleines Mypage", "license": {"name": "MIT License", "url": "https://github.com/nozomu-y/kleines-mypage-api/blob/main/LICENSE"}, "version": "1.0.0"}, "servers": [{"url": "https://www.chorkleines.com/member/mypage/api/v1/", "description": "Main server"}, {"url": "http://localhost:8888/kleines-mypage-api/v1/", "description": "Development"}], "paths": {"/auth": {"post": {"tags": ["auth"], "summary": "Authenticate user", "description": "Authenticate user and return JWT", "parameters": [], "requestBody": {"content": {"application/json": {"schema": {"type": "object", "properties": {"email": {"type": "string", "format": "email"}, "password": {"type": "string", "format": "password"}}}, "example": {"email": "example@gmail.com", "password": "password"}}}}, "responses": {"200": {"description": "", "content": {"application/json": {"schema": {"type": "object", "properties": {"token": {"type": "string", "format": "JWT"}, "user_id": {"type": "integer"}}}, "example": {"token": "JSON Web Token", "user_id": 0}}}}}}}, "/profile": {"get": {"tags": ["profile"], "summary": "Get user profiles of every users", "description": "Get user profiles of every users", "security": [{"bearerAuth": []}], "parameters": [{"name": "Authorization", "in": "header", "required": true, "schema": {"type": "string"}}], "responses": {"200": {"description": "Array of Profile models", "content": {"application/json": {"schema": {"type": "array", "items": {"$ref": "#/components/schemas/Profile"}, "example": [{"user_id": 1, "first_name": "\u540d", "last_name": "\u59d3", "name_kana": "\u30ab\u30ca", "grade": 20, "part": "S", "part_full": "Soprano"}, {"user_id": 2, "first_name": "\u540d", "last_name": "\u59d3", "name_kana": "\u30ab\u30ca", "grade": 19, "part": "A", "part_full": "Alto"}]}}}}}}}, "/profile/{user_id}": {"get": {"tags": ["profile"], "summary": "Get user profile from user_id", "description": "Get user profile from user_id", "security": [{"bearerAuth": []}], "parameters": [{"name": "user_id", "in": "path", "required": true, "schema": {"type": "integer"}}], "responses": {"200": {"description": "Profile model", "content": {"application/json": {"schema": {"type": "object", "items": {"$ref": "#/components/schemas/Profile"}, "example": {"user_id": 1, "first_name": "\u540d", "last_name": "\u59d3", "name_kana": "\u30ab\u30ca", "grade": 20, "part": "S", "part_full": "Soprano"}}}}}}}}}, "components": {"securitySchemes": {"bearerAuth": {"type": "http", "scheme": "bearer", "bearerFormat": "JWT"}}, "schemas": {"Profile": {"type": "object", "required": ["user_id"], "properties": {"user_id": {"type": "integer", "example": 1}, "first_name": {"type": "string", "example": "\u540d"}, "last_name": {"type": "string", "example": "\u59d3"}, "name_kana": {"type": "string", "example": "\u30ab\u30ca"}, "grade": {"type": "integer", "example": 20}, "part": {"type": "string", "example": "S"}, "part_full": {"type": "string", "example": "Soprano"}}}}}, "tags": [{"name": "auth", "description": "Authentication"}, {"name": "profile", "description": "Profiles"}], "externalDocs": {"description": "GitHub", "url": "https://github.com/nozomu-y/kleines-mypage-api"}};

  // Build a system
  const ui = SwaggerUIBundle({
    spec: spec,
    dom_id: '#swagger-ui',
    deepLinking: true,
    presets: [
      SwaggerUIBundle.presets.apis,
      SwaggerUIStandalonePreset
    ],
    plugins: [
      SwaggerUIBundle.plugins.DownloadUrl
    ],
    layout: "StandaloneLayout"
  })

  window.ui = ui
}
</script>
</body>

</html>
